---
layout: default
---
<div class="container-fluid">
  <div class="row mt-3">
    <div class="col-sm-10 col-lg-10">
        <div class="card-deck">
        {% assign sorted_posts = site.posts | sort: 'title' %}
        {% for post in sorted_posts %}
         <div class="col-6">
            <div class="card bg-light mb-3 w-100" height="100px">
              <div class="card-body">
                <h5 class="card-title">
                  <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
                </h5>
                <h6 class="card-subtitle">
                  <div class="post-meta">
                      {% for tag in post.tags %}
                      <button type="button" class="btn btn-outline-info btn-sm" style="font-size:0.8em;">
                        {{ tag }}
                      </button>
                      {% endfor %}
                  </div>

                  <span class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</span>
                </h6>
              </div>
            </div>
          </div>
        {% endfor %}
        </div>

    </div>
  </div>
</div>
